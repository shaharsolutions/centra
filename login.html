<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centra - התחברות</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body {
            background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section i {
            width: 56px;
            height: 56px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .logo-section h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--text-dark);
            margin: 0;
        }

        .logo-section p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .btn-google {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
            transition: all 0.2s;
        }

        .btn-google:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        /* Terms link style */
        #open-terms-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        #open-terms-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="favicon.png" alt="Centra Logo" style="width: 64px; height: 64px; margin-bottom: 16px; object-fit: contain;">
                <h2>Centra</h2>
                <p id="auth-subtitle">התחבר למערכת הניהול שלך</p>
            </div>
            
            <form id="login-form" class="modal-form">
                <div class="form-group">
                    <label for="auth-email">אימייל</label>
                    <input type="email" id="auth-email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="auth-password">סיסמה</label>
                    <div style="position: relative;">
                        <input type="password" id="auth-password" required placeholder="••••••••" style="width: 100%; padding-left: 40px;">
                        <button type="button" tabindex="-1" onclick="const input = document.getElementById('auth-password'); const icon = this.querySelector('[data-lucide]'); if (input.type === 'password') { input.type = 'text'; icon.setAttribute('data-lucide', 'eye-off'); } else { input.type = 'password'; icon.setAttribute('data-lucide', 'eye'); } if (window.lucide) { lucide.createIcons(); }" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: none; padding: 4px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px;">
                    <input type="checkbox" id="auth-remember" style="width: 18px; height: 18px; cursor: pointer;" checked>
                    <label for="auth-remember" style="margin-bottom: 0; cursor: pointer; color: var(--text-muted);">זכור אותי במכשיר זה</label>
                </div>
                
                <div id="auth-terms-group" class="form-group hidden" style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px;">
                    <input type="checkbox" id="auth-terms" style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="auth-terms" style="margin-bottom: 0; cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">
                        אני מאשר/ת את <a href="#" id="open-terms-link">תנאי השימוש</a> במערכת
                    </label>
                </div>

                <div id="auth-error" class="hidden" style="color: #EF4444; background: #FEF2F2; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
                </div>

                <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%; height: 52px; font-size: 1.1rem; font-weight: 600; margin-top: 8px; border-radius: 12px;">התחברות</button>
                
                <div style="display: flex; align-items: center; gap: 16px; margin: 24px 0; color: var(--text-muted); font-size: 0.9rem;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span>או</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <button type="button" id="google-auth-btn" class="btn btn-google" style="width: 100%; height: 52px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 600; border-radius: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>התחברות עם Google</span>
                </button>
                
                <div style="text-align: center; margin-top: 24px; color: var(--text-muted);">
                    <span id="auth-switch-text">אין לך חשבון?</span>
                    <button type="button" id="auth-switch-btn" style="background: none; border: none; color: var(--primary); font-weight: 600; cursor: pointer; padding: 0 4px;">הרשמה עכשיו</button>
                </div>
            </form>
        </div>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="landing.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px;">
                <i data-lucide="arrow-right" style="width: 16px;"></i>
                לדף הנחיתה
            </a>
        </div>
    </div>

    <!-- Modals (Terms & Privacy) -->
    <div id="terms-modal" class="modal-overlay hidden">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>תנאי שימוש</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 60vh; overflow-y: auto; padding: 20px;">
                <p>כאן יופיעו תנאי השימוש של המערכת...</p>
            </div>
            <div class="modal-footer">
                <button id="approve-terms-btn" class="btn btn-primary" style="width: 100%;">קראתי ואני מאשר/ת</button>
            </div>
        </div>
    </div>

    <div id="privacy-modal" class="modal-overlay hidden">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>מדיניות פרטיות</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 60vh; overflow-y: auto; padding: 20px;">
                <p>כאן תופיע מדיניות הפרטיות של המערכת...</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal" style="width: 100%;">סגירה</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Temporary Lucide init for icons that might be needed before auth.js
        if (window.lucide) lucide.createIcons();
    </script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
