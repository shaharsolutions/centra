<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centra | ניהול עסק לצלמות</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Centra - מערכת פשוטה וחכמה לניהול לקוחות ופרויקטים לצלמת המקצועית.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i data-lucide="camera" class="logo-icon"></i>
                <span>Centra</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>דשבורד</span>
                </li>
                <li data-view="clients">
                    <i data-lucide="users"></i>
                    <span>לקוחות</span>
                </li>
                <li data-view="projects">
                    <i data-lucide="briefcase"></i>
                    <span>פרויקטים</span>
                </li>
                <li data-view="calendar">
                    <i data-lucide="calendar"></i>
                    <span>לוח צילומים</span>
                </li>
                <li data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>הגדרות</span>
                </li>
            </ul>
        </nav>
        <!-- Mobile Navigation Bar -->
        <nav class="mobile-nav">
            <div class="mobile-nav-item active" data-view="dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>דשבורד</span>
            </div>
            <div class="mobile-nav-item" data-view="clients">
                <i data-lucide="users"></i>
                <span>לקוחות</span>
            </div>
            <div class="mobile-nav-item" data-view="projects">
                <i data-lucide="briefcase"></i>
                <span>פרויקטים</span>
            </div>
            <div class="mobile-nav-item" data-view="calendar">
                <i data-lucide="calendar"></i>
                <span>לוח צילומים</span>
            </div>
            <div class="mobile-nav-item" data-view="settings">
                <i data-lucide="settings"></i>
                <span>הגדרות</span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="header-info">
                    <h1 id="view-title">שלום, צלמת! 👋</h1>
                    <p id="view-subtitle">הנה מה שקורה בעסק שלך היום.</p>
                </div>
                <div class="header-actions">
                    <button id="quick-add-client-btn" class="btn btn-secondary">
                        <i data-lucide="user-plus"></i>
                        לקוח חדש
                    </button>
                    <button id="quick-add-project-btn" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        פרויקט חדש
                    </button>
                    <div class="user-profile">
                    </div>
                </div>
            </header>

            <section id="view-container" class="view-container">
                <!-- Dynamic Content Loads Here -->
            </section>
        </main>
    </div>

    <!-- Modal for Clients -->
    <div id="client-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="client-modal-title">לקוח חדש</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button type="button" id="edit-client-toggle" class="btn btn-secondary btn-sm" style="display:none;">
                        <i data-lucide="edit-2" style="width:14px;"></i> עריכה
                    </button>
                    <button type="button" id="cancel-edit-client" class="btn btn-secondary btn-sm" style="display:none;">
                        ביטול עריכה
                    </button>
                    <button class="close-modal">&times;</button>
                </div>
            </div>
            <form id="client-form" class="modal-form">
                <div class="form-group">
                    <label for="client-name">שם הלקוח</label>
                    <div class="view-group">
                        <input type="text" id="client-name" required placeholder="לדוגמה: שרה כהן" readonly>
                        <span id="client-name-view" class="view-text hidden"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="client-phone">טלפון</label>
                        <div class="view-group">
                            <input type="tel" id="client-phone" required placeholder="050-0000000" readonly>
                            <span id="client-phone-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="client-source">מקור פנייה</label>
                        <div class="view-group">
                            <select id="client-source" disabled>
                                <option value="whatsapp">וואטסאפ</option>
                                <option value="instagram">אינסטגרם</option>
                                <option value="recommendation">המלצה</option>
                                <option value="other">אחר</option>
                            </select>
                            <span id="client-source-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>

                <div class="notes-section" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <label>הערות ועדכונים</label>
                    <div id="client-notes-list" class="notes-timeline">
                        <!-- Notes will be loaded here -->
                    </div>
                    <div class="add-note-box" style="margin-top:12px; display:flex; gap:8px;">
                        <input type="text" id="new-client-note" placeholder="הוסיפי הערה חדשה..." style="flex:1;">
                        <button type="button" class="btn btn-secondary" onclick="app.addNote(event, 'client')">הוספה</button>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="delete-client-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" id="client-cancel-btn" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" id="save-client-btn" class="btn btn-primary" style="display:none;">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Projects -->
    <div id="project-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="project-modal-title">פרטי פרויקט</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button type="button" id="edit-project-toggle" class="btn btn-secondary btn-sm" style="display:none;">
                        <i data-lucide="edit-2" style="width:14px;"></i> עריכה
                    </button>
                    <button type="button" id="cancel-edit-project" class="btn btn-secondary btn-sm" style="display:none;">
                        ביטול עריכה
                    </button>
                    <button class="close-modal">&times;</button>
                </div>
            </div>
            <form id="project-form" class="modal-form">
                <div class="form-group">
                    <label for="project-client">לקוח</label>
                    <select id="project-client" required disabled>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="project-name">שם הפרויקט / חבילה</label>
                    <div class="view-group">
                        <input type="text" id="project-name" list="packages-list" required placeholder="בחרי חבילה או הקלידי שם..." readonly>
                        <datalist id="packages-list">
                            <!-- Populated by JS -->
                        </datalist>
                        <span id="project-name-view" class="view-text hidden"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="project-date">תאריך צילום</label>
                        <div class="view-group">
                            <input type="date" id="project-date" readonly>
                            <span id="project-date-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="project-status">סטטוס</label>
                        <select id="project-status">
                            <option value="new">פנייה חדשה</option>
                            <option value="quote">הצעת מחיר</option>
                            <option value="closed">סגור (נקבע תאריך)</option>
                            <option value="shooting">בצילום</option>
                            <option value="editing">בעריכה</option>
                            <option value="delivered">נמסר</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="proj-total-price">מחיר כולל (₪)</label>
                        <div class="view-group">
                            <input type="number" id="proj-total-price" placeholder="0" readonly>
                            <span id="proj-total-price-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="proj-deposit-paid">מקדמה שולמה (₪)</label>
                        <div class="view-group">
                            <input type="number" id="proj-deposit-paid" placeholder="0" readonly>
                            <span id="proj-deposit-paid-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="project-drive-container">קישור ל-Google Drive</label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <div class="view-group" style="flex:1;">
                            <input type="url" id="project-drive" placeholder="https://drive.google.com/..." readonly>
                            <span id="project-drive-view" class="view-text hidden"></span>
                        </div>
                        <a id="project-drive-link" target="_blank" class="btn btn-secondary" style="display:none; align-items:center; justify-content:center; padding:8px 12px; height:46px;">
                            <i data-lucide="external-link" style="width:18px;"></i>
                        </a>
                    </div>
                </div>
                <div class="notes-section" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <label>הערות ועדכונים</label>
                    <div id="project-notes-list" class="notes-timeline">
                        <!-- Notes will be loaded here -->
                    </div>
                    <div class="add-note-box" id="project-add-note-box" style="margin-top:12px; display:flex; gap:8px;">
                        <input type="text" id="new-project-note" placeholder="הוסיפי הערה חדשה..." style="flex:1;">
                        <button type="button" class="btn btn-secondary" onclick="app.addNote(event, 'project')">הוספה</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="delete-project-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" id="project-cancel-btn" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" id="save-project-btn" class="btn btn-primary" style="display:none;">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Package Modal -->
    <div id="package-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="package-modal-title">חבילה חדשה</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="package-form" class="modal-form">
                <div class="form-group">
                    <label for="package-name">שם החבילה</label>
                    <input type="text" id="package-name" required placeholder="לדוגמה: חבילת בת מצווה">
                </div>
                <div class="form-group">
                    <label for="package-price">מחיר (₪)</label>
                    <input type="number" id="package-price" required placeholder="0">
                </div>
                <div class="modal-footer">
                    <button type="button" id="delete-package-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" class="btn btn-primary">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay hidden" style="z-index: 1100;">
        <div class="modal" style="max-width: 400px; text-align: center;">
            <h3 id="confirm-title">האם את בטוחה?</h3>
            <p id="confirm-desc" style="margin: 15px 0; color: var(--text-muted);"></p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button id="confirm-yes-btn" class="btn btn-primary" style="background: #EF4444;">כן, למחוק</button>
                <button id="confirm-no-btn" class="btn btn-secondary">ביטול</button>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
