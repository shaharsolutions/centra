<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centra | ניהול עסק לצלמות</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Centra - מערכת פשוטה וחכמה לניהול לקוחות ופרויקטים לצלמת המקצועית.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i data-lucide="camera" class="logo-icon"></i>
                <span>Centra</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>דשבורד</span>
                </li>
                <li data-view="clients">
                    <i data-lucide="users"></i>
                    <span>לקוחות</span>
                </li>
                <li data-view="projects">
                    <i data-lucide="briefcase"></i>
                    <span>פרויקטים</span>
                </li>
                <li data-view="tasks">
                    <i data-lucide="check-square"></i>
                    <span>משימות</span>
                </li>
                <li data-view="shoots">
                    <i data-lucide="camera"></i>
                    <span>לוח צילומים</span>
                </li>
                <li data-view="payments">
                    <i data-lucide="dollar-sign"></i>
                    <span>גבייה</span>
                </li>
                <li data-view="calendar">
                    <i data-lucide="calendar"></i>
                    <span>לוח שנה</span>
                </li>
                <li data-view="locations">
                    <i data-lucide="map-pin"></i>
                    <span>לוקיישנים</span>
                </li>
                <li data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>הגדרות</span>
                </li>
            </ul>
        </nav>
        <!-- Mobile Navigation Bar -->
        <nav class="mobile-nav">
            <div class="mobile-nav-item active" data-view="dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>דשבורד</span>
            </div>
            <div class="mobile-nav-item" data-view="clients">
                <i data-lucide="users"></i>
                <span>לקוחות</span>
            </div>
            <div class="mobile-nav-item" data-view="projects">
                <i data-lucide="briefcase"></i>
                <span>פרויקטים</span>
            </div>
            <div class="mobile-nav-item" data-view="tasks">
                <i data-lucide="check-square"></i>
                <span>משימות</span>
            </div>
            <div class="mobile-nav-item" data-view="shoots">
                <i data-lucide="camera"></i>
                <span>צילומים</span>
            </div>
            <div class="mobile-nav-item" data-view="payments">
                <i data-lucide="dollar-sign"></i>
                <span>גבייה</span>
            </div>
            <div class="mobile-nav-item" data-view="calendar">
                <i data-lucide="calendar"></i>
                <span>לוח שנה</span>
            </div>
            <div class="mobile-nav-item" data-view="locations">
                <i data-lucide="map-pin"></i>
                <span>לוקיישנים</span>
            </div>
            <div class="mobile-nav-item" data-view="settings">
                <i data-lucide="settings"></i>
                <span>הגדרות</span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="header-info">
                    <h1 id="view-title">שלום צלמת! 👋</h1>
                    <p id="view-subtitle">הנה מה שקורה בעסק שלך היום.</p>
                </div>
                <div class="header-actions">
                    <button id="quick-add-client-btn" class="btn btn-secondary">
                        <i data-lucide="user-plus"></i>
                        לקוח חדש
                    </button>
                    <button id="quick-add-project-btn" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        פרויקט חדש
                    </button>
                    <div class="user-profile">
                    </div>
                </div>
            </header>

            <section id="view-container" class="view-container">
                <!-- Dynamic Content Loads Here -->
            </section>
        </main>
    </div>

    <!-- Modal for Clients -->
    <div id="client-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="client-modal-title">לקוח חדש</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button type="button" id="edit-client-toggle" class="btn btn-secondary btn-sm" style="display:none;">
                        <i data-lucide="edit-2" style="width:14px;"></i> עריכה
                    </button>
                    <button type="button" id="cancel-edit-client" class="btn btn-secondary btn-sm" style="display:none;">
                        ביטול עריכה
                    </button>
                    <button class="close-modal">&times;</button>
                </div>
            </div>
            <form id="client-form" class="modal-form">
                <div class="form-group">
                    <label for="client-name">שם הלקוח</label>
                    <div class="view-group">
                        <input type="text" id="client-name" required placeholder="לדוגמה: שרה כהן" readonly>
                        <span id="client-name-view" class="view-text hidden"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="client-phone">טלפון</label>
                        <div class="view-group">
                            <input type="tel" id="client-phone" required placeholder="050-0000000" readonly>
                            <span id="client-phone-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="client-source">מקור פנייה</label>
                        <div class="view-group">
                            <select id="client-source" disabled>
                                <option value="whatsapp">וואטסאפ</option>
                                <option value="instagram">אינסטגרם</option>
                                <option value="facebook">פייסבוק</option>
                                <option value="recommendation">המלצה</option>
                                <option value="other">אחר</option>
                            </select>
                            <span id="client-source-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="client-city">עיר מגורים</label>
                    <div class="view-group">
                        <input type="text" id="client-city" placeholder="לדוגמה: תל אביב" readonly>
                        <span id="client-city-view" class="view-text hidden"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="client-email">אימייל</label>
                    <div class="view-group">
                        <input type="email" id="client-email" placeholder="example@email.com" readonly>
                        <span id="client-email-view" class="view-text hidden"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>רשתות חברתיות</label>
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <div class="view-group" style="display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="instagram" style="width: 16px; color: #E1306C;"></i>
                            <div style="flex: 1;">
                                <input type="text" id="client-instagram" placeholder="שם משתמש אינסטגרם" readonly>
                                <span id="client-instagram-view" class="view-text hidden"></span>
                            </div>
                        </div>
                        <div class="view-group" style="display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="facebook" style="width: 16px; color: #1877F2;"></i>
                            <div style="flex: 1;">
                                <input type="text" id="client-facebook" placeholder="קישור לפייסבוק" readonly>
                                <span id="client-facebook-view" class="view-text hidden"></span>
                            </div>
                        </div>
                        <div class="view-group" style="display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="globe" style="width: 16px; color: var(--text-muted);"></i>
                            <div style="flex: 1;">
                                <input type="text" id="client-website" placeholder="אתר אינטרנט" readonly>
                                <span id="client-website-view" class="view-text hidden"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="projects-section" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <label>פרויקטים של הלקוח</label>
                    <div id="client-projects-list" style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
                        <!-- Projects will be loaded here -->
                    </div>
                </div>

                <div class="notes-section" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <label>הערות ועדכונים</label>
                    <div id="client-notes-list" class="notes-timeline">
                        <!-- Notes will be loaded here -->
                    </div>
                    <div class="add-note-box" style="margin-top:12px; display:flex; gap:8px;">
                        <input type="text" id="new-client-note" placeholder="הוסיפי הערה חדשה..." style="flex:1;">
                        <button type="button" class="btn btn-secondary" onclick="app.addNote(event, 'client')">הוספה</button>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="delete-client-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" id="client-cancel-btn" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" id="save-client-btn" class="btn btn-primary" style="display:none;">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Projects -->
    <div id="project-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="project-modal-title">פרטי פרויקט</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button type="button" id="edit-project-toggle" class="btn btn-secondary btn-sm" style="display:none;">
                        <i data-lucide="edit-2" style="width:14px;"></i> עריכה
                    </button>
                    <button type="button" id="cancel-edit-project" class="btn btn-secondary btn-sm" style="display:none;">
                        ביטול עריכה
                    </button>
                    <button class="close-modal">&times;</button>
                </div>
            </div>
            <form id="project-form" class="modal-form">
                <div class="form-group">
                    <label for="project-client">לקוח</label>
                    <select id="project-client" required disabled>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="project-name">שם הפרויקט / חבילה</label>
                    <div class="view-group">
                        <input type="text" id="project-name" list="packages-list" required placeholder="בחרי חבילה או הקלידי שם..." readonly>
                        <datalist id="packages-list">
                            <!-- Populated by JS -->
                        </datalist>
                        <span id="project-name-view" class="view-text hidden"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="project-subjects-count">מספר מצולמים</label>
                        <div class="view-group">
                            <input type="number" id="project-subjects-count" placeholder="0" readonly>
                            <span id="project-subjects-count-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="project-subjects-details">פירוט מצולמים (טקסט חופשי)</label>
                        <div class="view-group">
                            <input type="text" id="project-subjects-details" placeholder="למשל: זוג הורים ו-3 ילדים" readonly>
                            <span id="project-subjects-details-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="project-date">תאריך צילום</label>
                        <div class="view-group">
                            <input type="date" id="project-date" readonly onchange="app.fetchWeatherForProject()">
                            <span id="project-date-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="project-time">שעת צילום</label>
                        <div class="view-group">
                            <input type="time" id="project-time" readonly>
                            <span id="project-time-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="project-location">מיקום (לוקיישן)</label>
                        <div class="view-group">
                            <input type="text" id="project-location" placeholder="הזיני מיקום..." readonly onblur="app.fetchWeatherForProject()">
                            <span id="project-location-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="project-styling-call">שיחת סטיילינג</label>
                        <div class="view-group">
                            <select id="project-styling-call" disabled>
                                <option value="none">ללא</option>
                                <option value="1_week">שבוע לפני</option>
                                <option value="2_weeks">שבועיים לפני</option>
                            </select>
                            <span id="project-styling-call-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>
                <div id="project-weather-container" class="weather-widget hidden">
                    <!-- Weather info will be loaded here -->
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="project-status">סטטוס</label>
                        <select id="project-status">
                            <option value="new">פנייה חדשה</option>
                            <option value="quote">הצעת מחיר</option>
                            <option value="closed">נסגר (נקבע תאריך)</option>
                            <option value="not_closed">לא נסגר</option>
                            <option value="shooting">בצילום</option>
                            <option value="editing">בעריכה</option>
                            <option value="delivered">נמסר</option>
                        </select>
                    </div>
                </div>

                <div id="not-closed-reason-container" class="form-group hidden" style="margin-top: 12px;">
                    <label for="not-closed-reason">סיבת אי סגירה</label>
                    <div class="view-group">
                        <textarea id="not-closed-reason" placeholder="למה הלקוח לא סגר? (למשל: מחיר יקר מדי, לא זמינה בתאריך...)" readonly style="width:100%; min-height:80px; padding:12px; border:1px solid var(--border); border-radius:var(--radius-md); font-family:inherit;"></textarea>
                        <span id="not-closed-reason-view" class="view-text hidden"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="proj-total-price">מחיר כולל (₪)</label>
                        <div class="view-group">
                            <input type="number" id="proj-total-price" placeholder="0" readonly>
                            <span id="proj-total-price-view" class="view-text hidden"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="proj-deposit-paid">מקדמה שולמה (₪)</label>
                        <div class="view-group">
                            <input type="number" id="proj-deposit-paid" placeholder="0" readonly>
                            <span id="proj-deposit-paid-view" class="view-text hidden"></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="project-drive-container">קישור ל-Google Drive</label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <div class="view-group" style="flex:1;">
                            <input type="url" id="project-drive" placeholder="https://drive.google.com/..." readonly>
                            <span id="project-drive-view" class="view-text hidden"></span>
                        </div>
                        <a id="project-drive-link" target="_blank" class="btn btn-secondary" style="display:none; align-items:center; justify-content:center; padding:8px 12px; height:46px;">
                            <i data-lucide="external-link" style="width:18px;"></i>
                        </a>
                    </div>
                </div>
                <div class="project-checklists" id="project-checklists-container" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <div class="checklist-section">
                        <label><i data-lucide="list-checks" style="width:16px; margin-left:4px;"></i> דברים שאסור לשכוח</label>
                        <div id="checklist-shoot" class="checklist-items">
                            <!-- Items loaded via JS -->
                        </div>
                        <div class="add-checklist-box">
                            <input type="text" id="new-shoot-item" placeholder="הוסיפי משהו חשוב...">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="app.addChecklistItem('shoot', app.editingProjectId)">הוספה</button>
                        </div>
                    </div>

                    <div class="checklist-section" style="margin-top:20px;">
                        <label><i data-lucide="camera" style="width:16px; margin-left:4px;"></i> ציוד ליום צילום</label>
                        <div id="checklist-equipment" class="checklist-items">
                            <!-- Items loaded via JS -->
                        </div>
                        <div class="add-checklist-box">
                            <input type="text" id="new-equipment-item" placeholder="הוסיפי ציוד שצריך לקחת...">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="app.addChecklistItem('equipment', app.editingProjectId)">הוספה</button>
                        </div>
                    </div>
                </div>

                <div class="notes-section" style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border);">
                    <label>הערות ועדכונים</label>
                    <div id="project-notes-list" class="notes-timeline">
                        <!-- Notes will be loaded here -->
                    </div>
                    <div class="add-note-box" id="project-add-note-box" style="margin-top:12px; display:flex; gap:8px;">
                        <input type="text" id="new-project-note" placeholder="הוסיפי הערה חדשה..." style="flex:1;">
                        <button type="button" class="btn btn-secondary" onclick="app.addNote(event, 'project')">הוספה</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="delete-project-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" id="project-cancel-btn" class="btn btn-secondary close-modal">סגירה</button>
                    <button type="submit" id="save-project-btn" class="btn btn-primary" style="display:none;">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Package Modal -->
    <div id="package-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="package-modal-title">חבילה חדשה</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="package-form" class="modal-form">
                <div class="form-group">
                    <label for="package-name">שם החבילה</label>
                    <input type="text" id="package-name" required placeholder="לדוגמה: חבילת בת מצווה">
                </div>
                <div class="form-group">
                    <label for="package-price">מחיר (₪)</label>
                    <input type="number" id="package-price" required placeholder="0">
                </div>
                <div class="modal-footer">
                    <button type="button" id="delete-package-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA; display:none;">מחיקה</button>
                    <button type="button" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" class="btn btn-primary">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay hidden" style="z-index: 1100;">
        <div class="modal" style="max-width: 400px; text-align: center;">
            <h3 id="confirm-title">האם את בטוחה?</h3>
            <p id="confirm-desc" style="margin: 15px 0; color: var(--text-muted);"></p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button id="confirm-yes-btn" class="btn btn-primary" style="background: #EF4444;">כן, למחוק</button>
                <button id="confirm-no-btn" class="btn btn-secondary">ביטול</button>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="task-modal-title">פרטי משימה</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="task-form" class="modal-form">
                <div class="form-group">
                    <label for="task-content">תיאור המשימה</label>
                    <input type="text" id="task-content" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-due-date">תאריך יעד</label>
                        <input type="date" id="task-due-date">
                    </div>
                    <div class="form-group">
                        <label>סטטוס</label>
                        <div style="display:flex; align-items:center; gap:8px; height:46px;">
                            <input type="checkbox" id="task-completed-checkbox" style="width:20px; height:20px;">
                            <span>בוצע</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-notes">הערות ועדכונים</label>
                    <textarea id="task-notes" rows="4" placeholder="הוסיפי הערות או עדכונים לגבי המשימה..."></textarea>
                </div>

                <div id="task-project-info" style="font-size:0.85rem; color:var(--text-muted); margin-bottom:16px;">
                    <!-- Project info if linked -->
                </div>

                <div class="modal-footer">
                    <button type="button" id="delete-task-btn" class="btn btn-secondary" style="margin-left:auto; color:#EF4444; border-color:#FECACA;">מחיקה</button>
                    <button type="button" class="btn btn-secondary close-modal">ביטול</button>
                    <button type="submit" class="btn btn-primary">שמירה</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
